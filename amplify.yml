version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
        - mkdir -p site
        - cp -r *.html *.css *.js assest site/
        - cp -r dist site/dist
  artifacts:
    baseDirectory: site
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SantyCSS Playground — Try it live</title>
  <link rel="icon" type="image/png" href="assest/santy_css.png">
  <link rel="stylesheet" href="santy.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ed-bg:     #0d1117;
      --ed-hdr:    #161b22;
      --ed-border: #30363d;
      --ed-text:   #e6edf3;
      --ed-muted:  #7d8590;
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      display: flex;
      flex-direction: column;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: #f1f5f9;
    }

    /* ─── Navbar ─── */
    .nav {
      height: 54px;
      background: #0a0f1e;
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 14px;
      flex-shrink: 0;
      border-bottom: 1px solid #1e293b;
    }
    .nav-logo { display: flex; align-items: center; gap: 9px; text-decoration: none; }
    .nav-logo img { width: 30px; height: 30px; border-radius: 7px; }
    .nav-logo-name { font-size: 17px; font-weight: 800; color: #f1f5f9; letter-spacing: -.3px; }
    .nav-logo-name span { color: #3b82f6; }
    .nav-sep { width: 1px; height: 18px; background: #334155; }
    .nav-tag { font-size: 12px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: .06em; }
    .nav-badge {
      background: #1e3a5f;
      color: #93c5fd;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 20px;
      border: 1px solid #2563eb44;
    }
    .nav-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .nav-link {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 5px 13px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all .15s;
    }
    .nav-link:hover { background: #334155; color: #e2e8f0; border-color: #475569; }

    /* ─── Challenge bar ─── */
    .challenge-bar {
      background: linear-gradient(90deg, #1e1b4b, #312e81 60%, #1e1b4b);
      border-bottom: 1px solid #4338ca55;
      padding: 9px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .challenge-icon { font-size: 18px; }
    .challenge-text { font-size: 13px; color: #c7d2fe; flex: 1; min-width: 0; }
    .challenge-text strong { color: #fff; }
    .ch-btn {
      background: rgba(255,255,255,.08);
      color: #a5b4fc;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px;
      padding: 5px 13px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
    }
    .ch-btn:hover { background: rgba(255,255,255,.16); }

    /* ─── Body wrapper (main + picker) ─── */
    .body-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── Main split ─── */
    .split {
      flex: 1;
      min-height: 0;
      display: flex;
      overflow: hidden;
    }

    /* ─── Editor panel ─── */
    .editor-panel {
      width: 50%;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      background: var(--ed-bg);
      flex-shrink: 0;
    }

    .editor-toolbar {
      height: 50px;
      background: var(--ed-hdr);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 6px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--ed-border);
      border-right: 1px solid var(--ed-border);
    }

    .e-select {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid var(--ed-border);
      border-radius: 7px;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      outline: none;
      max-width: 160px;
    }
    .e-select:hover { border-color: #8b949e; }

    .e-btn {
      background: #21262d;
      color: #8b949e;
      border: 1px solid var(--ed-border);
      border-radius: 7px;
      padding: 4px 11px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      transition: all .15s;
    }
    .e-btn:hover { background: #30363d; color: #e6edf3; border-color: #8b949e; }
    .e-btn.g:hover { background: #0f2e15; color: #3fb950; border-color: #3fb950; }
    .e-btn.r:hover { background: #2d0e0e; color: #f85149; border-color: #f85149; }
    .e-spacer { flex: 1; }
    .e-count { font-size: 11px; color: #484f58; font-family: ui-monospace, monospace; }

    .editor-wrap { flex: 1; min-height: 0; position: relative; }
    .editor-gutter {
      position: absolute;
      top: 0; left: 0;
      width: 44px;
      height: 100%;
      background: #161b22;
      border-right: 1px solid var(--ed-border);
      font-family: ui-monospace, monospace;
      font-size: 12px;
      color: #484f58;
      padding-top: 18px;
      line-height: 1.7;
      text-align: right;
      padding-right: 8px;
      pointer-events: none;
      overflow: hidden;
      user-select: none;
    }
    .code-editor {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%;
      height: 100%;
      background: var(--ed-bg);
      color: var(--ed-text);
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', Menlo, monospace;
      font-size: 13px;
      line-height: 1.7;
      padding: 18px 18px 18px 52px;
      border: none;
      outline: none;
      resize: none;
      tab-size: 2;
    }
    .code-editor::selection { background: #264f78; }

    /* AI bar */
    .ai-bar {
      background: #161b22;
      border-top: 1px solid var(--ed-border);
      border-right: 1px solid var(--ed-border);
      padding: 9px 12px;
      display: flex;
      gap: 7px;
      align-items: center;
      flex-shrink: 0;
    }
    .ai-label { font-size: 13px; flex-shrink: 0; }
    .ai-input {
      flex: 1;
      background: var(--ed-bg);
      color: var(--ed-text);
      border: 1px solid var(--ed-border);
      border-radius: 8px;
      padding: 6px 11px;
      font-size: 12.5px;
      outline: none;
      font-family: inherit;
    }
    .ai-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px #3b82f620; }
    .ai-input::placeholder { color: #484f58; }
    .ai-go {
      background: #1d4ed8;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
    }
    .ai-go:hover { background: #2563eb; }

    /* ─── Resizer ─── */
    .resizer {
      width: 5px;
      background: #1e293b;
      cursor: col-resize;
      flex-shrink: 0;
      transition: background .15s;
      position: relative;
    }
    .resizer::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 3px;
      height: 32px;
      background: #334155;
      border-radius: 3px;
    }
    .resizer:hover, .resizer.dragging { background: #2563eb; }
    .resizer:hover::after, .resizer.dragging::after { background: #60a5fa; }

    /* ─── Preview panel ─── */
    .preview-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: #e8edf5;
    }
    .preview-toolbar {
      height: 50px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 8px;
      flex-shrink: 0;
    }
    .preview-label {
      font-size: 11px;
      font-weight: 800;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .07em;
    }
    .vp-group { display: flex; gap: 3px; }
    .vp-btn {
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 7px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: #94a3b8;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .vp-btn.active { background: #eff6ff; border-color: #3b82f6; color: #2563eb; }
    .vp-btn:hover:not(.active) { background: #f8fafc; color: #64748b; }
    .p-spacer { flex: 1; }
    .p-btn {
      background: #f8fafc;
      color: #475569;
      border: 1px solid #e2e8f0;
      border-radius: 7px;
      padding: 4px 11px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all .15s;
    }
    .p-btn:hover { background: #f1f5f9; border-color: #cbd5e1; }

    .preview-wrap {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .preview-shell {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,.14), 0 1px 4px rgba(0,0,0,.06);
      overflow: hidden;
      width: 100%;
      transition: width .25s cubic-bezier(.4,0,.2,1);
      flex-shrink: 0;
    }
    .preview-shell.mobile  { width: 375px; }
    .preview-shell.tablet  { width: 768px; }
    .preview-shell.desktop { width: 100%; }

    /* Browser chrome bar */
    .browser-chrome {
      background: #f1f5f9;
      border-bottom: 1px solid #e2e8f0;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.r { background: #fc6056; }
    .dot.y { background: #fdbc2c; }
    .dot.g { background: #33c748; }
    .url-bar {
      flex: 1;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 12px;
      color: #94a3b8;
      font-family: ui-monospace, monospace;
    }

    .preview-frame {
      width: 100%;
      height: 500px;
      border: none;
      display: block;
    }

    /* ─── Class picker ─── */
    .picker {
      background: #fff;
      border-top: 2px solid #e2e8f0;
      flex-shrink: 0;
      height: 210px;
      display: flex;
      flex-direction: column;
      transition: height .2s;
    }
    .picker.closed { height: 42px; }
    .picker-header {
      height: 42px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 6px;
      border-bottom: 1px solid #f1f5f9;
      flex-shrink: 0;
    }
    .picker-title { font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: .07em; flex-shrink: 0; }
    .picker-tabs { display: flex; gap: 2px; flex: 1; overflow-x: auto; scrollbar-width: none; }
    .picker-tabs::-webkit-scrollbar { display: none; }
    .ptab {
      background: none;
      border: none;
      border-radius: 7px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 700;
      color: #94a3b8;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
    }
    .ptab.active { background: #eff6ff; color: #2563eb; }
    .ptab:hover:not(.active) { background: #f8fafc; color: #64748b; }
    .picker-toggle { background: none; border: none; cursor: pointer; color: #94a3b8; font-size: 14px; padding: 4px 8px; border-radius: 7px; transition: all .15s; flex-shrink: 0; }
    .picker-toggle:hover { background: #f1f5f9; color: #475569; }

    .picker-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-content: flex-start;
    }
    .chip {
      background: #f8fafc;
      color: #475569;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 3px 9px;
      font-size: 11.5px;
      font-family: ui-monospace, monospace;
      font-weight: 700;
      cursor: pointer;
      transition: all .1s;
      white-space: nowrap;
      user-select: none;
    }
    .chip:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.1); }
    .chip[data-cat="layout"]:hover  { background: #eef2ff; color: #4338ca; border-color: #6366f1; }
    .chip[data-cat="spacing"]:hover { background: #ecfdf5; color: #059669; border-color: #10b981; }
    .chip[data-cat="type"]:hover    { background: #fffbeb; color: #b45309; border-color: #f59e0b; }
    .chip[data-cat="color"]:hover   { background: #fdf2f8; color: #be185d; border-color: #ec4899; }
    .chip[data-cat="border"]:hover  { background: #eff6ff; color: #1d4ed8; border-color: #3b82f6; }
    .chip[data-cat="fx"]:hover      { background: #f5f3ff; color: #6d28d9; border-color: #8b5cf6; }
    .chip[data-cat="comp"]:hover    { background: #fff1f2; color: #be123c; border-color: #ef4444; }
    .chip[data-cat="anim"]:hover    { background: #f0fdfa; color: #0f766e; border-color: #14b8a6; }

    /* ─── Toast ─── */
    .toast {
      position: fixed;
      bottom: 260px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e293b;
      color: #f1f5f9;
      padding: 9px 20px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 600;
      z-index: 9999;
      opacity: 0;
      transition: opacity .2s, transform .2s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Mobile */
    @media (max-width: 768px) {
      .split { flex-direction: column; }
      .editor-panel { width: 100%; height: 50%; }
      .resizer { display: none; }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="nav">
  <a href="index.html" class="nav-logo">
    <img src="assest/santy_css.png" alt="SantyCSS">
    <span class="nav-logo-name">Santy<span>CSS</span></span>
  </a>
  <div class="nav-sep"></div>
  <span class="nav-tag">Playground</span>
  <span class="nav-badge">v1.6.0</span>
  <div class="nav-right">
    <a href="classes.html" class="nav-link" target="_blank">📖 Classes</a>
    <a href="animations.html" class="nav-link" target="_blank">🎬 Animations</a>
    <a href="docs.html" class="nav-link" target="_blank">📦 Docs</a>
  </div>
</nav>

<!-- Challenge bar -->
<div class="challenge-bar" id="challengeBar">
  <span class="challenge-icon">🎯</span>
  <span class="challenge-text"><strong>Challenge:</strong> <span id="challengeText">Build a card with a blue left border, hover shadow, and a "New" badge</span></span>
  <button class="ch-btn" onclick="nextChallenge()">Next →</button>
  <button class="ch-btn" onclick="document.getElementById('challengeBar').style.display='none'" style="padding:5px 8px;">✕</button>
</div>

<!-- Main content wrapper -->
<div class="body-wrap">
  <!-- Split: editor + preview -->
  <div class="split" id="split">

    <!-- ── Editor ── -->
    <div class="editor-panel" id="editorPanel">

      <!-- Toolbar -->
      <div class="editor-toolbar">
        <select class="e-select" id="presetSel" onchange="loadPreset(this.value)">
          <option value="">📂 Load preset…</option>
          <option value="card">📇 Card</option>
          <option value="hero">🦸 Hero Section</option>
          <option value="pricing">💰 Pricing Cards</option>
          <option value="dashboard">📊 Dashboard</option>
          <option value="form">📝 Sign-up Form</option>
          <option value="buttons">🔘 Button Gallery</option>
          <option value="animations">✨ Animations</option>
          <option value="grid">🏗️ Bento Grid</option>
          <option value="navbar">🧭 Navbar</option>
          <option value="testimonial">💬 Testimonials</option>
        </select>

        <button class="e-btn g" onclick="copyHTML()">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy
        </button>

        <button class="e-btn" onclick="downloadHTML()">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          Save
        </button>

        <button class="e-btn" onclick="formatCode()">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h8M4 18h12"/></svg>
          Format
        </button>

        <div class="e-spacer"></div>
        <span class="e-count" id="classCount">0 classes</span>

        <button class="e-btn r" onclick="clearEditor()">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M3 6h18M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          Clear
        </button>
      </div>

      <!-- Code area -->
      <div class="editor-wrap">
        <div class="editor-gutter" id="gutter"></div>
        <textarea class="code-editor" id="codeEditor"
          spellcheck="false" autocorrect="off" autocapitalize="off"
          placeholder="Write SantyCSS HTML here…&#10;&#10;Or load a preset from the dropdown above."></textarea>
      </div>

      <!-- AI prompt bar -->
      <div class="ai-bar">
        <span class="ai-label">✨</span>
        <input class="ai-input" id="aiInput" type="text"
          placeholder="Describe a component… e.g. 'blue card with shadow and button'">
        <button class="ai-go" onclick="aiGenerate()">Generate</button>
      </div>
    </div>

    <!-- ── Resizer ── -->
    <div class="resizer" id="resizer"></div>

    <!-- ── Preview ── -->
    <div class="preview-panel" id="previewPanel">

      <!-- Preview toolbar -->
      <div class="preview-toolbar">
        <span class="preview-label">Live Preview</span>
        <div class="vp-group">
          <button class="vp-btn active" id="vp-desktop" onclick="setViewport('desktop')">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Desktop
          </button>
          <button class="vp-btn" id="vp-tablet" onclick="setViewport('tablet')">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><circle cx="12" cy="18" r=".5" fill="currentColor"/></svg>Tablet
          </button>
          <button class="vp-btn" id="vp-mobile" onclick="setViewport('mobile')">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="18" r=".5" fill="currentColor"/></svg>Mobile
          </button>
        </div>
        <div class="p-spacer"></div>
        <button class="p-btn" onclick="toggleDark()" id="darkBtn">🌙 Dark</button>
        <button class="p-btn" onclick="updatePreview()">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          Refresh
        </button>
      </div>

      <!-- Preview frame -->
      <div class="preview-wrap" id="previewWrap">
        <div class="preview-shell desktop" id="previewShell">
          <div class="browser-chrome">
            <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
            <div class="url-bar">santycss-playground</div>
          </div>
          <iframe class="preview-frame" id="previewFrame"
            sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
        </div>
      </div>
    </div>
  </div><!-- /split -->

  <!-- ── Class Picker ── -->
  <div class="picker" id="picker">
    <div class="picker-header">
      <span class="picker-title">Class Picker</span>
      <div class="picker-tabs">
        <button class="ptab active" onclick="showTab('layout',this)">Layout</button>
        <button class="ptab" onclick="showTab('spacing',this)">Spacing</button>
        <button class="ptab" onclick="showTab('type',this)">Typography</button>
        <button class="ptab" onclick="showTab('color',this)">Colors</button>
        <button class="ptab" onclick="showTab('border',this)">Borders</button>
        <button class="ptab" onclick="showTab('fx',this)">Effects</button>
        <button class="ptab" onclick="showTab('comp',this)">Components</button>
        <button class="ptab" onclick="showTab('anim',this)">Animations</button>
      </div>
      <button class="picker-toggle" id="pickerToggle" onclick="togglePicker()">▼</button>
    </div>
    <div class="picker-body" id="pickerBody"></div>
  </div>

</div><!-- /body-wrap -->

<!-- Toast -->
<div class="toast" id="toast"></div>

// ─── Challenges ───────────────────────────────────────────────────────────────
const CHALLENGES = [
  'Build a card with a blue left border, hover shadow, and a "New" badge',
  'Create a hero section with a gradient background and two CTA buttons',
  'Make a 3-column grid of feature cards with icons and a hover scale effect',
  'Build a pricing card with a highlighted "Most Popular" tier',
  'Create a dashboard stat card with a coloured accent border and trend arrow',
  'Build a sign-up form with a two-column name row and email/password fields',
  'Make a navbar with a logo, nav links, and a sign-up button on the right',
  'Create a testimonial card with a star rating and a circular avatar',
  'Build an animation showcase: 4 cards using different animate-* classes',
  'Make a dark-mode card (background-gray-900, color-white) with a glow shadow',
  'Create a badge group: success, warning, danger — all in a flex row',
  'Build a bento grid with one tall featured card spanning two rows',
];
let challengeIdx = 0;

// ─── AI map ───────────────────────────────────────────────────────────────────
const AI_MAP = [
  [/flex|row|inline/,            'make-flex flex-row align-center gap-16'],
  [/column|stack|vertical/,      'make-flex flex-column gap-16'],
  [/grid/,                       (t) => { const m=t.match(/(\d)\s*col/); return `make-grid grid-cols-${m?m[1]:'3'} gap-20`; }],
  [/center(ed)?|middle/,         'make-flex align-center justify-center'],
  [/hero|banner|jumbotron/,      'make-flex flex-column align-center justify-center text-center add-padding-y-96'],
  [/card/,                       'background-white round-corners-16 add-shadow-md add-padding-28 add-border-1 border-color-gray-100'],
  [/button|btn/,                 'make-button style-primary shape-pill size-large'],
  [/badge|tag|chip/,             'badge badge-primary'],
  [/form|input/,                 'input round-corners-8 add-padding-12'],
  [/nav(bar)?/,                  'background-white add-shadow-sm add-padding-y-16 add-padding-x-24 make-flex align-center justify-between'],
  [/shadow/,                     'add-shadow-lg on-hover:add-shadow-xl transition-all'],
  [/hover/,                      'on-hover:scale-105 on-hover:add-shadow-lg transition-all'],
  [/blue/,                       'background-blue-500 color-white'],
  [/green/,                      'background-green-500 color-white'],
  [/red|danger/,                 'background-red-500 color-white'],
  [/purple/,                     'background-purple-500 color-white'],
  [/dark|night/,                 'background-gray-900 color-white'],
  [/gradient/,                   (t) => `style="background:linear-gradient(135deg,#3b82f6,#8b5cf6)"`],
  [/rounded|pill/,               'round-corners-24'],
  [/bounce|jump/,                'animate-bounce'],
  [/fade/,                       'animate-fade-in'],
  [/slide/,                      'animate-slide-up'],
  [/spin|rotate/,                'animate-spin'],
  [/pulse|glow/,                 'animate-pulse'],
  [/rubber|elastic/,             'on-hover:animate-rubber-band'],
  [/shake|error/,                'animate-shake'],
  [/large|big|huge/,             'set-text-32 add-padding-32'],
  [/small|tiny|sm/,              'set-text-12 add-padding-8'],
  [/bold|strong/,                'text-bold'],
  [/border/,                     'add-border-2 border-color-blue-500'],
  [/circle|round/,               'make-circle add-padding-20'],
  [/padding|space/,              'add-padding-24'],
  [/white|light|clean/,          'background-white color-gray-900 add-shadow-sm'],
];

// ─── Core refs ────────────────────────────────────────────────────────────────
const editor    = document.getElementById('codeEditor');
const frame     = document.getElementById('previewFrame');
const gutter    = document.getElementById('gutter');
const countEl   = document.getElementById('classCount');
let darkPreview = false;
let debounce;

// ─── Preview update ───────────────────────────────────────────────────────────
function updatePreview() {
  const html = editor.value;
  // Class count
  const all = html.match(/class="([^"]*)"/g) || [];
  let n = 0;
  all.forEach(m => { n += m.replace(/class="|"/g,'').trim().split(/\s+/).filter(Boolean).length; });
  countEl.textContent = `${n} class${n!==1?'es':''}`;

  const base = location.href.replace(/[^/]*$/,'');
  const bg   = darkPreview ? '#0f172a' : '#ffffff';
  frame.srcdoc = `<!DOCTYPE html><html><head>
  <base href="${base}">
  <meta charset="UTF-8">
  <link rel="stylesheet" href="santy.css">
  <style>*{box-sizing:border-box;}body{margin:0;padding:0;background:${bg};font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;}</style>
</head><body>${html}
<script>
  function ping(){window.parent.postMessage({t:'h',v:document.documentElement.scrollHeight},'*');}
  new ResizeObserver(ping).observe(document.body); ping();
<\/script></body></html>`;
}

// ─── Auto-resize frame ────────────────────────────────────────────────────────
window.addEventListener('message', e => {
  if (e.data && e.data.t === 'h') {
    frame.style.height = Math.max(e.data.v, 300) + 'px';
  }
});

editor.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(updatePreview, 180);
  updateGutter();
});

// ─── Line numbers ─────────────────────────────────────────────────────────────
function updateGutter() {
  const lines = editor.value.split('\n').length;
  gutter.innerHTML = Array.from({length: lines}, (_,i) => i+1).join('<br>');
}
editor.addEventListener('scroll', () => { gutter.scrollTop = editor.scrollTop; });

// ─── Tab key ─────────────────────────────────────────────────────────────────
editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart, val = editor.value;
    editor.value = val.slice(0,s) + '  ' + val.slice(editor.selectionEnd);
    editor.selectionStart = editor.selectionEnd = s + 2;
    editor.dispatchEvent(new Event('input'));
  }
  if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); copyHTML(); }
  if ((e.ctrlKey||e.metaKey) && e.shiftKey && e.key==='F') { e.preventDefault(); formatCode(); }
});

// ─── Presets ─────────────────────────────────────────────────────────────────
function loadPreset(key) {
  if (!key || !PRESETS[key]) return;
  editor.value = PRESETS[key];
  updatePreview(); updateGutter();
  document.getElementById('presetSel').value = '';
}
function clearEditor() {
  if (!editor.value || confirm('Clear the editor?')) { editor.value=''; updatePreview(); updateGutter(); }
}

// ─── Copy / save ─────────────────────────────────────────────────────────────
function copyHTML() {
  navigator.clipboard.writeText(editor.value).then(() => toast('✅ HTML copied!'));
}
function downloadHTML() {
  const base = location.href.replace(/[^/]*/,'');
  const full = `<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>SantyCSS Component</title>\n  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/santycss/dist/santy.css">\n</head>\n<body style="font-family:ui-sans-serif,system-ui,sans-serif;">\n${editor.value}\n</body>\n</html>`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([full],{type:'text/html'}));
  a.download = 'santycss-component.html';
  a.click();
  toast('📥 Downloaded!');
}

// ─── Format ───────────────────────────────────────────────────────────────────
function formatCode() {
  let ind=0, lines=editor.value.split('\n');
  editor.value = lines.map(l=>{
    const t=l.trim(); if(!t) return '';
    if(t.startsWith('</')) ind=Math.max(0,ind-1);
    const out='  '.repeat(ind)+t;
    if(/^<[^/!][^>]*[^/]>$/.test(t)&&!/^<(br|hr|input|img|link|meta)/.test(t)) ind++;
    return out;
  }).join('\n');
  updatePreview(); updateGutter();
  toast('✨ Formatted!');
}

// ─── Viewport ─────────────────────────────────────────────────────────────────
function setViewport(size) {
  document.getElementById('previewShell').className = `preview-shell ${size}`;
  ['desktop','tablet','mobile'].forEach(v =>
    document.getElementById('vp-'+v).classList.toggle('active', v===size));
}

// ─── Dark preview ─────────────────────────────────────────────────────────────
function toggleDark() {
  darkPreview = !darkPreview;
  const b = document.getElementById('darkBtn');
  b.textContent = darkPreview ? '☀️ Light' : '🌙 Dark';
  document.getElementById('previewWrap').style.background = darkPreview ? '#0a0f1e' : '#e8edf5';
  updatePreview();
}

// ─── Class picker ─────────────────────────────────────────────────────────────
let pickerOpen = true;
let activeTab = 'layout';

function showTab(tab, btn) {
  activeTab = tab;
  document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderChips(tab);
}
function renderChips(tab) {
  const body = document.getElementById('pickerBody');
  body.innerHTML = (CATS[tab]||[]).map(cls =>
    `<span class="chip" data-cat="${tab}" onclick="chipClick('${cls}')" title="Click to insert / copy">${cls}</span>`
  ).join('');
}
function chipClick(cls) {
  const sel = editor.selectionStart, val = editor.value;
  const before = val.slice(0, sel);
  const inside = before.match(/class="([^"]*)$/);
  if (inside) {
    const gap = before.endsWith(' ') || before.endsWith('"') ? '' : ' ';
    const after = val.slice(editor.selectionEnd);
    editor.value = before + gap + cls + after;
    editor.selectionStart = editor.selectionEnd = sel + gap.length + cls.length;
    editor.focus();
    editor.dispatchEvent(new Event('input'));
    toast(`Added: ${cls}`);
  } else {
    navigator.clipboard.writeText(cls).then(() => toast(`📋 ${cls}`));
  }
}
function togglePicker() {
  pickerOpen = !pickerOpen;
  document.getElementById('picker').classList.toggle('closed', !pickerOpen);
  document.getElementById('pickerToggle').textContent = pickerOpen ? '▼' : '▲';
}

// ─── AI generator ─────────────────────────────────────────────────────────────
function aiGenerate() {
  const raw = document.getElementById('aiInput').value.toLowerCase().trim();
  if (!raw) return;
  const classes = [], styles = [];
  AI_MAP.forEach(([pat, res]) => {
    if (pat.test(raw)) {
      const r = typeof res === 'function' ? res(raw) : res;
      if (r.startsWith('style=')) styles.push(r.replace(/^style="/,'').replace(/"$/,''));
      else classes.push(...r.split(' ').filter(Boolean));
    }
  });
  if (!classes.length && !styles.length) { toast('🤔 Try: "blue card with shadow" or "hero section"'); return; }
  const cls = [...new Set(classes)].join(' ');
  const sty = styles.join(';');
  const sAttr = sty ? ` style="${sty}"` : '';
  let snippet;
  if (/hero|banner/.test(raw))
    snippet = `<section class="${cls}"${sAttr}>\n  <h1 class="set-text-56 text-bold add-margin-bottom-16">Hero Heading</h1>\n  <p class="set-text-18 add-margin-bottom-32" style="opacity:.8;">Your subtitle goes here.</p>\n  <button class="make-button style-primary size-large shape-pill">Get started →</button>\n</section>`;
  else if (/button|btn/.test(raw))
    snippet = `<button class="${cls}"${sAttr}>Click me</button>`;
  else if (/nav/.test(raw))
    snippet = `<nav class="${cls}"${sAttr}>\n  <span class="set-text-18 text-bold">Logo</span>\n  <div class="make-flex gap-16">\n    <a href="#">Home</a>\n    <a href="#">About</a>\n    <button class="make-button style-primary size-small">Sign up</button>\n  </div>\n</nav>`;
  else
    snippet = `<div class="${cls}"${sAttr}>\n  <h3 class="set-text-18 text-bold add-margin-bottom-8">Card Title</h3>\n  <p class="set-text-14 color-gray-500 line-height-relaxed">Your content goes here.</p>\n</div>`;

  editor.value = (editor.value ? editor.value + '\n\n' : '') + snippet;
  updatePreview(); updateGutter();
  document.getElementById('aiInput').value = '';
  toast('✨ Generated!');
}
document.getElementById('aiInput').addEventListener('keydown', e => { if (e.key==='Enter') aiGenerate(); });

// ─── Challenges ───────────────────────────────────────────────────────────────
function nextChallenge() {
  challengeIdx = (challengeIdx + 1) % CHALLENGES.length;
  document.getElementById('challengeText').textContent = CHALLENGES[challengeIdx];
}

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 2000);
}

// ─── Drag resizer ─────────────────────────────────────────────────────────────
const resizer = document.getElementById('resizer');
const edPanel = document.getElementById('editorPanel');
const splitEl = document.getElementById('split');
let dragging = false;

resizer.addEventListener('mousedown', () => {
  dragging = true;
  resizer.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const r = splitEl.getBoundingClientRect();
  const pct = ((e.clientX - r.left) / r.width) * 100;
  edPanel.style.width = Math.min(Math.max(pct, 20), 80) + '%';
});
document.addEventListener('mouseup', () => {
  if (dragging) { dragging=false; resizer.classList.remove('dragging'); document.body.style.cursor=''; document.body.style.userSelect=''; }
});

// ─── Init ─────────────────────────────────────────────────────────────────────
renderChips('layout');
loadPreset('card');
updateGutter();
</script>
